<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bizplay 설정 도우미</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, sans-serif; background: #f5f5f5; color: #111; }
  .wrap { max-width: 720px; margin: 0 auto; padding: 2rem 1rem; }
  .header { margin-bottom: 2rem; }
  .header h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .header p { font-size: 13px; color: #888; }
  .input-area { background: #fff; border-radius: 12px; border: 1px solid #e0e0e0; padding: 16px; margin-bottom: 12px; }
  textarea { width: 100%; border: none; outline: none; font-size: 14px; font-family: inherit; resize: none; height: 72px; line-height: 1.6; background: transparent; color: inherit; }
  .input-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { font-size: 12px; color: #666; border: 1px solid #e0e0e0; border-radius: 20px; padding: 4px 12px; cursor: pointer; background: #fff; transition: background 0.1s; }
  .chip:hover { background: #f0f0f0; }
  .btn { padding: 8px 20px; font-size: 13px; font-weight: 600; background: #111; color: #fff; border: none; border-radius: 8px; cursor: pointer; white-space: nowrap; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .results { display: flex; flex-direction: column; gap: 12px; }
  .card { background: #fff; border-radius: 12px; border: 1px solid #e0e0e0; overflow: hidden; }
  .card-q { padding: 10px 16px; background: #f9f9f9; border-bottom: 1px solid #e0e0e0; font-size: 13px; color: #666; display: flex; gap: 8px; align-items: flex-start; }
  .q-badge { font-size: 11px; font-weight: 600; background: #e0e0e0; color: #555; padding: 2px 7px; border-radius: 4px; white-space: nowrap; margin-top: 1px; }
  .card-body { padding: 16px; font-size: 14px; line-height: 1.75; }
  .path-tag { display: inline-block; font-size: 12px; font-weight: 500; background: #e8f0fe; color: #1a56db; padding: 4px 10px; border-radius: 6px; margin: 10px 0 4px; }
  .related { margin-top: 12px; padding-top: 12px; border-top: 1px solid #f0f0f0; font-size: 12px; color: #999; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .rel-btn { font-size: 12px; color: #1a56db; background: none; border: none; cursor: pointer; text-decoration: underline; text-decoration-style: dotted; font-family: inherit; padding: 0; }
  .loading { background: #fff; border-radius: 12px; border: 1px solid #e0e0e0; padding: 20px 16px; font-size: 13px; color: #999; display: flex; align-items: center; gap: 10px; }
  .dots { display: flex; gap: 4px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #ccc; animation: pulse 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,80%,100%{opacity:0.3} 40%{opacity:1} }
  .empty { text-align: center; padding: 3rem 1rem; color: #bbb; font-size: 13px; line-height: 1.8; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>bizplay 설정 도우미</h1>
    <p>설정이 어디 있는지 모르겠을 때 자연어로 물어보세요</p>
  </div>

  <div class="input-area">
    <textarea id="q" placeholder="예) 일비를 직책별로 다르게 설정할 수 있나?&#10;예) 해외출장 숙박비 한도는 어디서 바꿔?"></textarea>
    <div class="input-footer">
      <div></div>
      <button class="btn" id="askBtn" onclick="ask()">물어보기</button>
    </div>
  </div>

  <div class="chips" style="margin-bottom: 1.5rem;">
    <span class="chip" onclick="fillQ(this)">일비 직책별 차등 설정</span>
    <span class="chip" onclick="fillQ(this)">출장 승인 프로세스 설정</span>
    <span class="chip" onclick="fillQ(this)">해외출장 일비 한도 변경</span>
    <span class="chip" onclick="fillQ(this)">특정 부서만 규정 다르게 적용</span>
    <span class="chip" onclick="fillQ(this)">교통비 영수증 첨부 여부 설정</span>
  </div>

  <div class="results" id="results">
    <div class="empty">궁금한 설정을 자연어로 질문하면<br>어느 메뉴에서 무엇을 하면 되는지 바로 알려드립니다</div>
  </div>
</div>

<script>
const API_KEY = 'AIzaSyDDoEl6mp4DUNvHN3kT6R51lmbS5oIHto4';

const SYSTEM_PROMPT = `당신은 bizplay(비즈플레이) B2B 출장관리 SaaS의 관리자 설정 도우미입니다.
관리자가 설정 방법을 물어보면, 어느 메뉴 경로에서 어떻게 설정하는지 친절하고 간결하게 안내하세요.

=== bizplay 관리자 메뉴 구조 ===

[결제 문서 설정] 결제 문서 양식, 서명 설정
[마스터 관리] 사용자 관리, 조직도, 직책/직급 관리, 코스트센터
[HR] 근태, 휴가 연동 설정
[전표 설정] 회계 전표 자동 생성 규칙
[기초정보관리] 기본 회사 정보, 환율 설정

[규정 설정]
- 사용자 그룹 관리: 직책/직급/부서별 그룹 생성, 규정 적용 대상 정의
- 금지 관리: 특정 카테고리 사용 금지 설정

[출장비 설정]
- 유류비 설정: 자동차 이용 시 유류비 지급 기준
- 컴플라이언스 설정: 규정 초과/위반 시 처리 방식
- 예외 이동경로: 특정 경로 예외 처리
- 출장 규정 설정:
  · 기본정보: 규정 이름, 적용일/종료일, 중복 규정 적용기준
  · 탭-숙박비: 국내/해외 구분, 사용자그룹별 한도, 지역별 차등
  · 탭-일비: 규정구분(일반/예외), 유형(국내/해외), 비목, 출장목적, 사용자그룹(직책별 차등 핵심), 지급구분, 기준금액, 지급옵션
  · 탭-동행료: 동반 출장자 추가 지급
  · 탭-교통비: 수단별 한도, 영수증 첨부 필수 여부
  · 탭-유류비: km당 단가
  · 탭-식비: 끼니별 한도, 사용자그룹별 차등
  · 탭-비자발급비: 해외출장 비자 비용 한도
  · 탭-취소수수료: 예약 취소 시 수수료 처리
  · 탭-로밍비: 해외 로밍 비용 한도
  · 탭-주차비: 주차 비용 지급 기준
  · 탭-기타: 기타 비목

[출장 결재설정] 출장 신청/정산 결재라인, 승인 단계, 자동승인 조건
[권한 관리] 관리자 권한 부여, 역할별 접근 메뉴
[비용관리 설정] 법인카드 연동, 비용처리 기준
[알림 관리] 이메일/앱 푸시 알림 설정
[기타 관리] 기타 시스템 설정

=== 응답 형식 (반드시 JSON만 반환, 마크다운 없이) ===
{"answer": "2-3문장 설명", "path": "메뉴 > 서브메뉴 > 탭", "field": "필드명 또는 null", "related_menus": ["관련설정1", "관련설정2"]}`;

function fillQ(el) {
  document.getElementById('q').value = el.textContent;
}

async function ask() {
  const q = document.getElementById('q').value.trim();
  if (!q) return;

  const btn = document.getElementById('askBtn');
  btn.disabled = true;

  const resultsEl = document.getElementById('results');
  if (resultsEl.querySelector('.empty')) resultsEl.innerHTML = '';

  const loader = document.createElement('div');
  loader.className = 'loading';
  loader.innerHTML = '<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div><span>설정 메뉴 탐색 중...</span>';
  resultsEl.insertBefore(loader, resultsEl.firstChild);

  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
          contents: [{ parts: [{ text: q }] }]
        })
      }
    );

    const data = await res.json();
    const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    const clean = raw.replace(/```json|```/g, '').trim();

    let parsed;
    try { parsed = JSON.parse(clean); }
    catch { parsed = { answer: raw, path: null, field: null, related_menus: [] }; }

    loader.remove();

    const card = document.createElement('div');
    card.className = 'card';

    const pathHtml = parsed.path
      ? `<div class="path-tag">📍 ${parsed.path}${parsed.field ? ' → ' + parsed.field : ''}</div>`
      : '';

    const relatedHtml = parsed.related_menus?.length
      ? `<div class="related"><span>관련 설정:</span>${parsed.related_menus.map(m =>
          `<button class="rel-btn" onclick="document.getElementById('q').value='${m} 설정 방법 알려줘'; ask()">${m}</button>`
        ).join('')}</div>`
      : '';

    card.innerHTML = `
      <div class="card-q"><span class="q-badge">Q</span><span>${q}</span></div>
      <div class="card-body">${parsed.answer}${pathHtml}${relatedHtml}</div>
    `;

    resultsEl.insertBefore(card, resultsEl.firstChild);
    document.getElementById('q').value = '';

  } catch(e) {
    loader.remove();
    const err = document.createElement('div');
    err.className = 'card';
    err.innerHTML = '<div class="card-body" style="color:#e53e3e">오류가 발생했습니다. API 키를 확인하거나 다시 시도해주세요.</div>';
    resultsEl.insertBefore(err, resultsEl.firstChild);
  }

  btn.disabled = false;
}

document.getElementById('q').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); ask(); }
});
</script>
</body>
</html>
